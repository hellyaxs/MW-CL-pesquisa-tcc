<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<!-- Created on 2009-04-10 by Jorge Stolfi with the script make-hash-table-figure -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="315.0" height="230.0" id="fig" stroke-linejoin="round" stroke-opacity="1" stroke-linecap="round" fill-opacity="1" fill-rule="evenodd" font-family="Bitstream Courier" font-style="normal" font-weight="normal" pagecolor="#ffff00" pageopacity="0.0">


  <g font-size="12px" transform="scale(1.0) translate(10,60)">

  <defs>
    <!-- Start marker for non-null pointers: -->
    <marker id="linkdot_N" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <circle cx="4" cy="4" r="3" stroke="#000000" fill="#000000"/>
    </marker>
    <!-- Start marker for null pointers: -->
    <marker id="linkdot_U" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <line x1="1" y1="1" x2="7" y2="7" stroke="#000000"/>
      <line x1="1" y1="7" x2="7" y2="1" stroke="#000000"/>
    </marker>

    <!-- Tip for arrows: -->
    <marker id="arrowtip_N" viewBox="0 0 14 8" refX="13" refY="4" markerWidth="14" markerHeight="8" orient="auto">
      <polygon points="1,4  1,1  13,4  1,7" stroke="#000000" fill="#000000"/>
    </marker>
    <!-- Tip for highlighted arrows: -->
    <marker id="arrowtip_C" viewBox="0 0 14 8" refX="13" refY="4" markerWidth="14" markerHeight="8" orient="auto">
      <polygon points="1,4  1,1  13,4  1,7" stroke="#cc0000" fill="#cc0000"/>
    </marker>

    <!-- Key box in input column, normal: -->
    <rect id="key_box_N" y="0" x="0" width="90" height="20" fill="#00ffff" stroke="none"/>
    <!-- Key box in input column, highlighted : -->
    <rect id="key_box_C" y="0" x="0" width="90" height="20" fill="#00ffff" stroke="none"/>
    <!-- Key box in bucket or overflow columns, normal: -->
    <rect id="key_box_E" y="0" x="0" width="90" height="20" fill="#9cff9c" stroke="#000000"/>
    <!-- Key box in bucket or overflow columns, vacant: -->
    <rect id="key_box_U" y="0" x="0" width="90" height="20" fill="#ddeedd" stroke="#000000"/>

    <!-- Value box in bucket or overflow columns, occupied: -->
    <rect id="val_box_E" y="0" x="0" width="80" height="20" fill="#9cff9c" stroke="#000000"/>
    <!-- Value box in bucket or overflow columns, vacant: -->
    <rect id="val_box_U" y="0" x="0" width="80" height="20" fill="#ddeedd" stroke="#000000"/>

    <!-- Pointer box in bucket or overflow columns, used and non-null: -->
    <rect id="ptr_box_E" y="0" x="0" width="20" height="20" fill="#9cff9c" stroke="#000000"/>
    <!-- Pointer box in bucket or overflow columns, null/vacant: -->
    <rect id="ptr_box_U" y="0" x="0" width="20" height="20" fill="#ddeedd" stroke="#000000"/>

    <!-- Background for hash value, unused: -->
    <rect id="hsh_box_U" x="3" y="1" width="24" height="18" fill="#ddeedd" stroke="none"/>
    <!-- Background for hash value, used: -->
    <rect id="hsh_box_N" x="3" y="1" width="24" height="18" fill="#a8a8ff" stroke="none"/>
    <!-- Background for hash value, highlighted: -->
    <rect id="hsh_box_C" x="3" y="1" width="24" height="18" fill="#ee4444" stroke="none"/>

    <!-- Vertical dots: -->
    <g id="vdots">
      <rect x="0" y="06" width="2" height="2"/>
      <rect x="0" y="12" width="2" height="2"/>
    </g>
 </defs>

    <!-- Keys and hash function -->
    <g transform="translate(0,000)" text-anchor="middle" stroke="none">

      <switch><text x="130" y="-30" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg20-mk" systemLanguage="mk"><tspan id="trsvg1-mk">раздроб.</tspan></text><text x="130" y="-30" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg20"><tspan id="trsvg1"> hash  </tspan></text></switch>
      <switch><text x="130" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg21-mk" systemLanguage="mk"><tspan id="trsvg2-mk">функц.</tspan></text><text x="130" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg21"><tspan id="trsvg2"> function </tspan></text></switch>

      <rect x="100" y="0" width="60" height="160" fill="#aaeecc" stroke="none"/>

      <switch><text x="45" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg22-mk" systemLanguage="mk"><tspan id="trsvg3-mk">клучеви</tspan></text><text x="45" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg22"><tspan id="trsvg3"> keys
 </tspan></text></switch>

      <g transform="translate(0,30)">
        <use xlink:href="#key_box_N"/>
        <switch><text x="45" y="14" stroke="none" id="trsvg23-mk" systemLanguage="mk"><tspan id="trsvg4-mk">Мирче Ацев</tspan></text><text x="45" y="14" stroke="none" id="trsvg23"><tspan id="trsvg4">John Smith</tspan></text></switch>
        <line x1="95" y1="10" x2="105" y2="10" stroke="#000000"/>
        <line x1="105" y1="10" x2="155" y2="20" stroke="#000000"/>
        <line x1="155" y1="20" x2="180" y2="20" stroke="#000000" marker-end="url(#arrowtip_N)"/>
      </g>
      <g transform="translate(0,70)">
        <use xlink:href="#key_box_N"/>
        <switch><text x="45" y="14" stroke="none" id="trsvg24-mk" systemLanguage="mk"><tspan id="trsvg5-mk">Вера Ацева</tspan></text><text x="45" y="14" stroke="none" id="trsvg24"><tspan id="trsvg5">Lisa Smith</tspan></text></switch>
        <line x1="95" y1="10" x2="105" y2="10" stroke="#000000"/>
        <line x1="105" y1="10" x2="155" y2="-40" stroke="#000000"/>
        <line x1="155" y1="-40" x2="180" y2="-40" stroke="#000000" marker-end="url(#arrowtip_N)"/>
      </g>
      <g transform="translate(0,110)">
        <use xlink:href="#key_box_N"/>
        <switch><text x="45" y="14" stroke="none" id="trsvg25-mk" systemLanguage="mk"><tspan id="trsvg6-mk">Боро Чаушев</tspan></text><text x="45" y="14" stroke="none" id="trsvg25"><tspan id="trsvg6">Sandra Dee</tspan></text></switch>
        <line x1="95" y1="10" x2="105" y2="10" stroke="#000000"/>
        <line x1="105" y1="10" x2="155" y2="20" stroke="#000000"/>
        <line x1="155" y1="20" x2="180" y2="20" stroke="#000000" marker-end="url(#arrowtip_N)"/>
      </g>

    </g>

    <!-- Hash values and bucket array -->
    <g transform="translate(180,000)" text-anchor="middle" stroke="none">

      <switch><text x="70" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg26-mk" systemLanguage="mk"><tspan id="trsvg7-mk">корпи</tspan></text><text x="70" y="-10" font-size="15px" font-weight="bold" fill="#000000" stroke="none" id="trsvg26"><tspan id="trsvg7">
 buckets
 </tspan></text></switch>

      <g transform="translate(000,0)">
        <use x="0" xlink:href="#hsh_box_U"/>
        <switch><text x="15" y="14" id="trsvg27"><tspan id="trsvg8">00</tspan></text></switch>
        <use x="30" xlink:href="#val_box_U"/>
      </g>
      <g transform="translate(000,20)">
        <use x="0" xlink:href="#hsh_box_N"/>
        <switch><text x="15" y="14" id="trsvg28"><tspan id="trsvg9">01</tspan></text></switch>
        <use x="30" xlink:href="#val_box_E"/>
        <switch><text x="70" y="14" id="trsvg29"><tspan id="trsvg10">521-8976</tspan></text></switch>
      </g>
      <g transform="translate(000,40)">
        <use x="0" xlink:href="#hsh_box_N"/>
        <switch><text x="15" y="14" id="trsvg30"><tspan id="trsvg11">02</tspan></text></switch>
        <use x="30" xlink:href="#val_box_E"/>
        <switch><text x="70" y="14" id="trsvg31"><tspan id="trsvg12">521-1234</tspan></text></switch>
      </g>
      <g transform="translate(000,60)">
        <use x="0" xlink:href="#hsh_box_U"/>
        <switch><text x="15" y="14" id="trsvg32"><tspan id="trsvg13">03</tspan></text></switch>
        <use x="30" xlink:href="#val_box_U"/>
      </g>
      <g transform="translate(000,80)">
        <switch><text x="15" y="14" font-weight="bold" id="trsvg33"><tspan id="trsvg14">:</tspan></text></switch>
        <switch><text x="70" y="14" font-weight="bold" id="trsvg34"><tspan id="trsvg15">:</tspan></text></switch>
      </g>
      <g transform="translate(000,100)">
        <use x="0" xlink:href="#hsh_box_U"/>
        <switch><text x="15" y="14" id="trsvg35"><tspan id="trsvg16">13</tspan></text></switch>
        <use x="30" xlink:href="#val_box_U"/>
      </g>
      <g transform="translate(000,120)">
        <use x="0" xlink:href="#hsh_box_N"/>
        <switch><text x="15" y="14" id="trsvg36"><tspan id="trsvg17">14</tspan></text></switch>
        <use x="30" xlink:href="#val_box_E"/>
        <switch><text x="70" y="14" id="trsvg37"><tspan id="trsvg18">521-9655</tspan></text></switch>
      </g>
      <g transform="translate(000,140)">
        <use x="0" xlink:href="#hsh_box_U"/>
        <switch><text x="15" y="14" id="trsvg38"><tspan id="trsvg19">15</tspan></text></switch>
        <use x="30" xlink:href="#val_box_U"/>
      </g>

    </g>


  </g>
</svg>
